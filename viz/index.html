<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skill Graph</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    header h1 {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    header p {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }
    .stats {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: right;
    }
    .view-switch {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .view-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-right: 0.1rem;
    }
    .view-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.35rem 0.7rem;
      border-radius: 6px;
      font-size: 0.75rem;
      text-decoration: none;
    }
    .view-btn:hover { border-color: var(--accent); }
    .view-btn.active {
      border-color: var(--accent);
      background: rgba(88,166,255,0.12);
      font-weight: 600;
    }
    .download-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.35rem 0.7rem;
      border-radius: 6px;
      font-size: 0.75rem;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }
    .download-btn:hover { border-color: var(--accent); }
    .map-select-wrap {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .map-select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.35rem 0.55rem;
      border-radius: 6px;
      font-size: 0.75rem;
      min-width: 12rem;
    }
    .map-select:focus { outline: none; border-color: var(--accent); }
    main {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 0;
      height: 100%;
      position: relative;
    }
    #graph {
      width: 100%;
      height: 100%;
      min-height: 400px;
      min-width: 0;
      position: relative;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #131920 0%, var(--bg) 70%);
    }
    aside {
      border-right: 1px solid var(--border);
      background: var(--panel);
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      z-index: 10;
      min-width: 320px;
      max-width: 320px;
    }
    aside h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      padding: 0.25rem 0;
      cursor: pointer;
      border-radius: 4px;
    }
    .legend-item:hover { background: rgba(255,255,255,0.04); }
    .legend-item.dimmed { opacity: 0.35; }
    .swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .detail-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem;
    }
    .detail-card h3 {
      font-size: 0.95rem;
      margin-bottom: 0.35rem;
      line-height: 1.3;
    }
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      background: rgba(88,166,255,0.15);
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .detail-card p {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.45;
    }
    .objectives {
      list-style: none;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.5rem;
      max-height: 200px;
      overflow-y: auto;
    }
    .objectives li {
      padding: 0.35rem 0;
      border-bottom: 1px solid var(--border);
      line-height: 1.35;
    }
    .prereq-list {
      list-style: none;
      font-size: 0.78rem;
    }
    .prereq-list li {
      padding: 0.3rem 0;
      color: var(--muted);
      cursor: pointer;
    }
    .prereq-list li:hover { color: var(--accent); }
    .hint {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.4;
    }
    .layout-btns {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    button {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.35rem 0.6rem;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.active { border-color: var(--accent); background: rgba(88,166,255,0.1); }
    .start-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      color: #f0c14b;
      margin-top: 0.35rem;
      cursor: pointer;
    }
    .start-badge:hover { text-decoration: underline; }
    .search-box {
      width: 100%;
      margin-top: 0.4rem;
      padding: 0.45rem 0.6rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.8rem;
    }
  </style>
  <link rel="stylesheet" href="viewer.css" />
</head>
<body>
  <header>
    <div class="header-start">
      <button type="button" class="menu-btn" id="menu-btn" aria-label="Open sidebar" aria-expanded="false" aria-controls="viewer-sidebar">
        <span class="menu-icon" aria-hidden="true"></span>
      </button>
      <div class="header-title">
        <h1 id="page-title">Skill Graph</h1>
        <p id="page-subtitle" class="header-subtitle">Loading map…</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="map-select-wrap">
        <label class="view-label" for="map-select">Map</label>
        <select id="map-select" class="map-select" aria-label="Select skill map"></select>
      </div>
      <nav class="view-switch" aria-label="Graph view">
        <span class="view-label">View</span>
        <a href="index.html" class="view-btn active" id="link-2d">2D</a>
        <a href="3d.html" class="view-btn" id="link-3d">3D</a>
      </nav>
      <a id="map-download" class="download-btn" href="#">Download</a>
      <div class="stats header-stats" id="stats"></div>
    </div>
  </header>
  <button type="button" class="sidebar-backdrop" id="sidebar-backdrop" aria-label="Close sidebar" aria-hidden="true" tabindex="-1"></button>
  <main>
    <aside id="viewer-sidebar">
      <div>
        <h2>Layout</h2>
        <div class="layout-btns" style="margin-top:0.4rem">
          <button id="btn-hier">Hierarchical</button>
          <button id="btn-physics" class="active">Force</button>
          <button id="btn-start">Go to start</button>
          <button id="btn-fit">Fit view</button>
        </div>
      </div>
      <div>
        <h2>Search</h2>
        <input class="search-box" id="search" type="search" placeholder="e.g. electrolysis, redox, mole…" />
        <h2 style="margin-top:0.75rem">Topics — click to filter</h2>
        <div id="legend"></div>
      </div>
      <div id="detail">
        <p class="hint">Click a node for evidence & prerequisites. Search to find skills. Drag to pan, scroll to zoom.</p>
      </div>
    </aside>
    <div id="graph"></div>
  </main>

  <script type="module">
    import {
      loadMapsCatalog, getSelectedMapId, persistMapId, mapDataUrl, fetchJson,
      setupMapSelector, applyMapHeader, viewHref, setupMapDownload,
    } from './maps.js';
    import { initViewerSidebar } from './viewer.js';

    async function main() {
    const sidebar = initViewerSidebar();

    const catalog = await loadMapsCatalog();
    const mapId = getSelectedMapId(catalog);
    const map = catalog.maps.find(m => m.id === mapId) || catalog.maps.find(m => m.available);
    persistMapId(map.id);

    const topicsDoc = await fetchJson(mapDataUrl(map, 'topics.json'));
    const [depsDoc, manifest] = await Promise.all([
      fetchJson(mapDataUrl(map, 'dependencies.json')),
      fetchJson(mapDataUrl(map, 'manifest.json')),
    ]);

    applyMapHeader(map, document.getElementById('page-subtitle'));
    document.getElementById('page-subtitle').textContent +=
      ' · each node is a teachable micro-skill · edges are prerequisites';
    document.getElementById('link-2d').href = viewHref('index.html', map.id);
    document.getElementById('link-3d').href = viewHref('3d.html', map.id);
    setupMapSelector(catalog, map.id, (id) => {
      location.href = viewHref('index.html', id);
    });
    setupMapDownload(map);

    const topics = topicsDoc.topics;
    const deps = depsDoc.dependencies;
    const byId = new Map(topics.map(t => [t.id, t]));

    const isMicro = topicsDoc.granularity === 'microskills';
    const nodeCount = manifest.counts.microskills ?? manifest.counts.topics ?? topics.length;

    document.getElementById('stats').textContent =
      `${nodeCount} micro-skills · ${manifest.counts.dependencies} edges · ${manifest.counts.objectives} syllabus objectives`;

    const adj = new Map(topics.map(t => [t.id, []]));
    const rev = new Map(topics.map(t => [t.id, []]));
    for (const d of deps) {
      adj.get(d.topicId).push({ id: d.prerequisiteId, strength: d.strength, reason: d.reason });
      rev.get(d.prerequisiteId).push({ id: d.topicId, strength: d.strength });
    }

    function allPrerequisites(topicId, seen = new Set()) {
      for (const p of adj.get(topicId) ?? []) {
        if (!seen.has(p.id)) {
          seen.add(p.id);
          allPrerequisites(p.id, seen);
        }
      }
      return seen;
    }

    const mainTopics = [...new Set(topics.map(t => t.mainTopicNumber))].sort((a, b) => a - b);
    const hiddenTopics = new Set();

    // Assign compact depth levels from prerequisite edges (roots = 0).
    const depth = new Map(topics.map(t => [t.id, 0]));
    for (let pass = 0; pass < topics.length; pass++) {
      for (const d of deps) {
        const prereqDepth = depth.get(d.prerequisiteId) ?? 0;
        const next = prereqDepth + 1;
        if (next > (depth.get(d.topicId) ?? 0)) depth.set(d.topicId, next);
      }
    }

    const hasPrereq = new Set(deps.map(d => d.topicId));
    const startNode = topics.find(t => t.entryPoint) ??
      topics.find(t => t.code === '1.1.1') ??
      topics.find(t => !hasPrereq.has(t.id) && t.mainTopicNumber === 1);

    const nodes = new vis.DataSet(topics.map(t => {
      const isStart = startNode && t.id === startNode.id;
      return {
        id: t.id,
        label: isStart ? 'START\n' + t.code : (isMicro ? t.code : (t.code + '\n' + truncate(t.name, 28))),
        title: (isStart ? '★ Syllabus entry point\n' : '') + `${t.code}\n${t.name}\n${t.subtopic ?? t.domain}`,
        group: t.mainTopicNumber,
        level: depth.get(t.id) ?? 0,
        color: isStart ? {
          background: '#FFD54F',
          border: '#FFFFFF',
          highlight: { background: '#FFF9C4', border: '#FFFFFF' },
        } : {
          background: t.color,
          border: '#e6edf3',
          highlight: { background: '#ffffff', border: t.color },
        },
        font: { color: isStart ? '#0d1117' : '#0d1117', size: isMicro ? (isStart ? 10 : 9) : 11, face: 'Segoe UI', bold: isStart },
        margin: isMicro ? (isStart ? 8 : 4) : 10,
        borderWidth: isStart ? 4 : 2,
        size: isMicro ? (isStart ? 22 : 12) : undefined,
        shape: isStart ? 'star' : (isMicro ? 'dot' : 'box'),
      };
    }));

    const edges = new vis.DataSet(deps.map((d, i) => ({
      id: i,
      from: d.prerequisiteId,
      to: d.topicId,
      arrows: 'to',
      dashes: d.strength === 'soft',
      color: { color: d.strength === 'hard' ? 'rgba(88,166,255,0.55)' : 'rgba(139,148,158,0.35)' },
      width: d.strength === 'hard' ? 1.5 : 0.8,
    })));

    const container = document.getElementById('graph');
    let layoutMode = 'hierarchical';

    const options = {
      physics: {
        enabled: true,
        solver: 'forceAtlas2Based',
        forceAtlas2Based: { gravitationalConstant: -120, springLength: 90, springConstant: 0.06 },
        stabilization: { iterations: 250, fit: true },
      },
      layout: { hierarchical: false },
      interaction: { hover: true, tooltipDelay: 80, multiselect: false, zoomView: true },
      edges: { smooth: { type: 'dynamic' } },
      nodes: { shadow: { enabled: true, size: 6, x: 0, y: 1 } },
    };

    const network = new vis.Network(container, { nodes, edges }, options);

    function fitGraph() {
      network.fit({ animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
    }

    function setGraphHeight() {
      const main = document.querySelector('main');
      const graph = document.getElementById('graph');
      if (main && graph) graph.style.height = `${main.clientHeight}px`;
      network.redraw();
      fitGraph();
    }

    function truncate(s, n) {
      return s.length > n ? s.slice(0, n - 1) + '…' : s;
    }

    function renderLegend() {
      const el = document.getElementById('legend');
      el.innerHTML = '';
      for (const num of mainTopics) {
        const sample = topics.find(t => t.mainTopicNumber === num);
        const item = document.createElement('div');
        item.className = 'legend-item' + (hiddenTopics.has(num) ? ' dimmed' : '');
        item.innerHTML = `<span class="swatch" style="background:${sample.color}"></span><span>${num}. ${sample.domain}</span>`;
        item.onclick = () => {
          if (hiddenTopics.has(num)) hiddenTopics.delete(num);
          else hiddenTopics.add(num);
          applyFilter();
          renderLegend();
        };
        el.appendChild(item);
      }
    }

    function applyFilter() {
      const updates = topics.map(t => ({
        id: t.id,
        hidden: hiddenTopics.has(t.mainTopicNumber),
      }));
      nodes.update(updates);
    }

    function showDetail(topic) {
      const prereqs = [...allPrerequisites(topic.id)].map(id => byId.get(id)).filter(Boolean);

      document.getElementById('detail').innerHTML = `
        <div class="detail-card">
          <span class="badge">${topic.code} · ${topic.type ?? 'SKILL'} · ${topic.subtopic ?? topic.domain}</span>
          <h3>${escapeHtml(topic.name)}</h3>
          <p>${escapeHtml(topic.description)}</p>
          ${topic.evidence?.length ? `<ul class="objectives">${topic.evidence.map(e =>
            `<li>${escapeHtml(e)}</li>`
          ).join('')}</ul>` : ''}
          ${topic.assessmentPrompt ? `<p class="hint" style="margin-top:0.5rem"><em>${escapeHtml(topic.assessmentPrompt)}</em></p>` : ''}
        </div>
        ${prereqs.length ? `
        <div>
          <h2>Prerequisites (${prereqs.length})</h2>
          <ul class="prereq-list">${prereqs.map(p =>
            `<li data-id="${p.id}">${p.code} — ${escapeHtml(truncate(p.name, 48))}</li>`
          ).join('')}</ul>
        </div>` : '<p class="hint">No prerequisites — foundation skill.</p>'}
      `;

      document.querySelectorAll('.prereq-list li').forEach(li => {
        li.onclick = () => {
          network.selectNodes([li.dataset.id]);
          network.focus(li.dataset.id, { scale: 1.2, animation: true });
        };
      });
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function highlightNode(nodeId) {
      const chain = allPrerequisites(nodeId);
      chain.add(nodeId);

      nodes.update(topics.map(t => ({
        id: t.id,
        opacity: chain.has(t.id) ? 1 : 0.12,
      })));

      const edgeUpdates = deps.map((d, i) => ({
        id: i,
        hidden: !(chain.has(d.topicId) && chain.has(d.prerequisiteId)),
      }));
      edges.update(edgeUpdates);
    }

    function resetHighlight() {
      nodes.update(topics.map(t => ({ id: t.id, opacity: 1 })));
      edges.update(deps.map((_, i) => ({ id: i, hidden: false })));
    }

    network.on('click', ({ nodes: selected }) => {
      if (!selected.length) { resetHighlight(); return; }
      const topic = byId.get(selected[0]);
      highlightNode(selected[0]);
      showDetail(topic);
      sidebar?.closeIfMobile();
    });

    document.getElementById('btn-hier').onclick = (e) => {
      layoutMode = 'hierarchical';
      document.querySelectorAll('.layout-btns button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      network.setOptions({
        physics: { enabled: false },
        layout: {
          hierarchical: {
            enabled: true,
            direction: 'UD',
            sortMethod: 'directed',
            levelSeparation: 110,
            nodeSpacing: 140,
            treeSpacing: 180,
          },
        },
      });
      setTimeout(fitGraph, 300);
    };

    document.getElementById('btn-physics').onclick = (e) => {
      layoutMode = 'force';
      document.querySelectorAll('.layout-btns button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      network.setOptions({
        layout: { hierarchical: false },
        physics: {
          enabled: true,
          solver: 'forceAtlas2Based',
          forceAtlas2Based: { gravitationalConstant: -80, springLength: 160, springConstant: 0.04 },
          stabilization: { iterations: 200, fit: true },
        },
      });
    };

    document.getElementById('search').oninput = (e) => {
      const q = e.target.value.trim().toLowerCase();
      if (!q) {
        nodes.update(topics.map(t => ({ id: t.id, hidden: hiddenTopics.has(t.mainTopicNumber), opacity: 1 })));
        return;
      }
      const matched = new Set(
        topics.filter(t =>
          t.name.toLowerCase().includes(q) ||
          t.code.includes(q) ||
          (t.description && t.description.toLowerCase().includes(q)) ||
          (t.subtopic && t.subtopic.toLowerCase().includes(q))
        ).map(t => t.id)
      );
      nodes.update(topics.map(t => ({
        id: t.id,
        hidden: hiddenTopics.has(t.mainTopicNumber) || !matched.has(t.id),
        opacity: matched.has(t.id) ? 1 : 0.15,
      })));
      if (matched.size === 1) network.focus([...matched][0], { scale: 1.5, animation: true });
    };

    function goToStart() {
      if (!startNode) return;
      network.selectNodes([startNode.id]);
      network.focus(startNode.id, { scale: 1.8, animation: true });
      showDetail(startNode);
      highlightNode(startNode.id);
    }

    document.getElementById('btn-start').onclick = () => goToStart();
    document.getElementById('btn-fit').onclick = () => fitGraph();

    renderLegend();
    if (startNode) {
      const hint = document.querySelector('#detail .hint');
      if (hint) {
        hint.innerHTML = `★ <span class="start-badge" id="start-link">1.1.1 — syllabus starts here</span>. Click a node for details. Search to find skills.`;
        document.getElementById('start-link').onclick = goToStart;
      }
    }
    setGraphHeight();
    window.addEventListener('resize', setGraphHeight);
    network.once('stabilized', fitGraph);
    network.on('afterDrawing', () => {
      if (!network._hasFitted) {
        network._hasFitted = true;
        fitGraph();
      }
    });
    }

    main().catch((err) => {
      console.error(err);
      const sub = document.getElementById('page-subtitle');
      if (sub) sub.textContent = `Load failed: ${err.message}`;
      const detail = document.getElementById('detail');
      if (detail) {
        detail.innerHTML = `<p class="hint" style="color:#f85149">${err.message}</p>`;
      }
    });
  </script>
</body>
</html>
